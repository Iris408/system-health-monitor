name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python-check:
    runs-on: ubuntu-latest

    env:
      SLACK_WEBHOOK_URL: https://example.com/test-webhook
      EMAIL_HOST: smtp.example.com
      EMAIL_PORT: 587
      EMAIL_USER: test@example.com
      EMAIL_PASSWORD: test-password
      EMAIL_TO: test@example.com
      CPU_WARNING_THRESHOLD: 70
      CPU_CRITICAL_THRESHOLD: 90
      MEMORY_WARNING_THRESHOLD: 70
      MEMORY_CRITICAL_THRESHOLD: 90
      DISK_WARNING_THRESHOLD: 70
      DISK_CRITICAL_THRESHOLD: 90

    steps:
      # EN: Check out the repository code
      # JP: リポジトリのコードを取得します
      - name: Checkout repository
        uses: actions/checkout@v4

      # EN: Set up Python for the monitoring project
      # JP: 監視プロジェクト用にPythonを設定します
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # EN: Install project dependencies
      # JP: プロジェクトの依存関係をインストールします
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # EN: Check Python syntax
      # JP: Pythonコードの構文を確認します
      - name: Check Python syntax
        run: |
          python -m compileall .

      # EN: Confirm key modules can be imported
      # JP: 主要モジュールが正常にインポートできることを確認します
      - name: Check module imports
        run: |
          python -c "import logger; print('logger imported successfully')"
          python -c "import alerts; print('alerts imported successfully')"
          python -c "import email_alerts; print('email_alerts imported successfully')"
          python -c "import dashboard; print('dashboard imported successfully')"